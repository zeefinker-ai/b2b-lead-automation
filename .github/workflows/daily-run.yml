name: Daily B2B Lead Bot

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Lead Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: node index.js
